name: QT CI

on: [push, pull_request]
env:
    QT_VERSION: '6.7.2'

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{env.QT_VERSION}}
          modules: 'qtspeech qtmultimedia'
      - name: Build
        run: |
          qmake "CONFIG +=test"
          make
          make check

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{env.QT_VERSION}}
          modules: 'qtspeech qtmultimedia'
      - name: Test
        run: |
          qmake "CONFIG +=test"
          make
          make check
      - name: Build
        run: |
          make clean
          qmake
          make
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app.zip
          path: |
            build/release/olam.app
            build/release

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{env.QT_VERSION}}
          modules: 'qtspeech qtmultimedia'
      - name: Build
        run: |
          call "%programfiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          qmake "CONFIG +=test"
          nmake
          nmake check
        shell: cmd
